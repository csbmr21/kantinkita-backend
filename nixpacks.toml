[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.curl",
  "php82Extensions.tokenizer",
  "php82Extensions.zip",
  "php82Extensions.gd",
  "php82Extensions.bcmath",
  "php82Extensions.fileinfo",
  "php82Extensions.intl",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --no-scripts"]

[phases.build]
cmds = [
  "php artisan storage:link --force || true"
]

[start]
cmd = "php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
